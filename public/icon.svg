<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Elegant geometric Hourglass graphic (Transparent Background version) -->
  <g transform="translate(128, 96)">
    <!-- Top and Bottom caps (rust orange) -->
    <rect x="16" y="16" width="224" height="32" rx="12" fill="#e56b55" />
    <rect x="16" y="272" width="224" height="32" rx="12" fill="#e56b55" />
    
    <!-- Glass body (curves inward to a neck in the middle) -->
    <path d="M 32 48 
             C 32 110, 112 130, 112 160 
             C 112 190, 32 210, 32 272 
             L 224 272 
             C 224 210, 144 190, 144 160 
             C 144 130, 224 110, 224 48 
             Z" 
          fill="none" 
          stroke="#f4efe2" 
          stroke-width="12" 
          stroke-linejoin="round" 
          stroke-linecap="round"
          opacity="0.95" />
    
    <!-- Top Sand (falling/depleting) -->
    <path d="M 40 60 
             C 40 110, 114 132, 114 145 
             L 142 145 
             C 142 132, 216 110, 216 60 
             Z" 
          fill="#e56b55" 
          opacity="0.9" />
          
    <!-- Falling sand stream -->
    <line x1="128" y1="145" x2="128" y2="255" stroke="#e56b55" stroke-width="8" stroke-dasharray="12,12" stroke-linecap="round" opacity="0.95" />

    <!-- Bottom Sand (accumulating) -->
    <path d="M 112 185 
             C 112 185, 128 180, 144 185
             C 136 215, 40 225, 40 260
             L 216 260
             C 216 225, 120 215, 112 185
             Z" 
          fill="#e56b55" />
  </g>
</svg>
